/* ============================================================
   RDO BID — multi-DP slot model
   3 slots positioned 2-4 in the page layout.
   Each slot: { include, view, days[28] each with state1/state2 }
   ============================================================ */

// Dynamic per-DP RDO slots. Length is 3 for normal groups, 4 for the year-end
// (DPs 10-13) group. ensureRDOSlots resizes the array preserving any existing
// data when possible.
const rdoSlots = [];
function ensureRDOSlots(n) {
  while (rdoSlots.length < n) rdoSlots.push({ view: '1', days: [] });
  while (rdoSlots.length > n) rdoSlots.pop();
}
ensureRDOSlots(3);

// Holiday helpers (same as before)
function easterDate(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const L = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * L) / 451);
  const month = Math.floor((h + L - 7 * m + 114) / 31);
  const day = ((h + L - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}
function nthWeekdayOfMonth(year, month, weekday, n) {
  if (n > 0) {
    const d = new Date(year, month, 1);
    const offset = (weekday - d.getDay() + 7) % 7;
    d.setDate(1 + offset + (n - 1) * 7);
    return d;
  } else {
    const d = new Date(year, month + 1, 0);
    const offset = (d.getDay() - weekday + 7) % 7;
    d.setDate(d.getDate() - offset);
    return d;
  }
}
function getHolidaysForYear(year) {
  const map = new Map();
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const add = (d, name, paid) => map.set(fmt(d), { name, paid });
  // MOU 30/39 paid holidays
  add(new Date(year, 0, 1), "New Year's Day", true);
  add(easterDate(year), "Easter Sunday", true);
  add(nthWeekdayOfMonth(year, 4, 1, -1), "Memorial Day", true);
  add(new Date(year, 5, 19), "Juneteenth", true);
  add(new Date(year, 6, 4), "Independence Day", true);
  add(nthWeekdayOfMonth(year, 8, 1, 1), "Labor Day", true);
  add(new Date(year, 10, 11), "Veteran's Day", true);
  add(nthWeekdayOfMonth(year, 10, 4, 4), "Thanksgiving Day", true);
  add(new Date(year, 11, 24), "Christmas Eve", true);
  add(new Date(year, 11, 25), "Christmas Day", true);
  add(new Date(year, 11, 31), "New Year's Eve", true);
  // Federal-only
  add(nthWeekdayOfMonth(year, 0, 1, 3), "MLK Jr. Day", false);
  add(nthWeekdayOfMonth(year, 1, 1, 3), "Presidents' Day", false);
  add(nthWeekdayOfMonth(year, 9, 1, 2), "Columbus Day", false);
  return map;
}
const holidayCache = new Map();
function holidayFor(d) {
  const yr = d.getFullYear();
  if (!holidayCache.has(yr)) holidayCache.set(yr, getHolidaysForYear(yr));
  const key = `${yr}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return holidayCache.get(yr).get(key) || null;
}

// 2-letter codes for holidays — used on the BLANK PDF and legend.
// Picked to avoid collisions with state codes (RDO, VC, M/L, H, JD, FL, SK).
const HOLIDAY_CODES = [
  ["New Year's Day",   "NY"],
  ["MLK Jr. Day",      "MK"],
  ["Presidents' Day",  "PR"],
  ["Easter Sunday",    "EA"],
  ["Memorial Day",     "ME"],
  ["Juneteenth",       "JT"],
  ["Independence Day", "IN"],
  ["Labor Day",        "LB"],
  ["Columbus Day",     "CO"],
  ["Veteran's Day",    "VT"],
  ["Thanksgiving Day", "TG"],
  ["Christmas Eve",    "XE"],
  ["Christmas Day",    "XD"],
  ["New Year's Eve",   "NE"],
];
const HOLIDAY_CODE_BY_NAME = Object.fromEntries(HOLIDAY_CODES.map(([n,c]) => [n, c]));
function holidayCodeFor(d) {
  const h = holidayFor(d);
  if (!h) return '';
  return HOLIDAY_CODE_BY_NAME[h.name] || '';
}

/* ============================================================
   Determining which DP each slot represents
   When "Match Watch Bid Period" is on (default), slot N = watch starting DP + N
   When off, RDO uses its own r-startdp dropdown
   ============================================================ */
const rMatchWatch = document.getElementById('r-match-watch');
const rStartDP = document.getElementById('r-startdp');
const rStartDPWrap = document.getElementById('r-startdp-wrap');

function buildRDOStartDPOptions() {
  // Reuse the watch DP triple grouping
  buildWatchDPOptions(rStartDP);
}
buildRDOStartDPOptions();

function getRDOStartDP() {
  if (isFullYear()) {
    return { dp: 1, year: +wYearSel.value };
  }
  if (rMatchWatch.checked) {
    const [dp, yr] = wStartDP.value.split('-').map(Number);
    return { dp, year: yr };
  } else {
    const [dp, yr] = rStartDP.value.split('-').map(Number);
    return { dp, year: yr };
  }
}

// How many DPs are in the currently-selected bid group? In full-year mode this is
// always 13. Otherwise it's the size of the year-quarter group (3, except 4 for
// the year-end DPs 10-13).
function numDPsInGroup() {
  if (isFullYear()) return 13;
  const { dp } = getRDOStartDP();
  const [first, last] = dpGroupForYearAndStartDP(dp);
  return last - first + 1;
}

function getRDOSlotDP(slot) {
  let { dp, year } = getRDOStartDP();
  for (let i = 0; i < slot; i++) ({ dp, year } = nextDP(dp, year));
  return getDPInfo(dp, year);
}

function nextDP(dp, yr) {
  let d = dp + 1, y = yr;
  if (d > 13) { d = 1; y += 1; }
  return { dp: d, year: y };
}

rMatchWatch.addEventListener('change', () => {
  rStartDPWrap.style.display = rMatchWatch.checked ? 'none' : '';
  buildAllSlots();
});
rStartDP.addEventListener('change', buildAllSlots);
// Sync RDO when watch DP changes (only when matching)
wStartDP.addEventListener('change', () => {
  if (rMatchWatch.checked) buildAllSlots();
});
// Initialize: hide r-startdp by default since match-watch is on
rStartDPWrap.style.display = 'none';

/* ============================================================
   Build the per-slot RDO panels
   ============================================================ */
const rdoSlotsEl = document.getElementById('rdo-slots');

function buildAllSlots() {
  rdoSlotsEl.innerHTML = '';
  const n = numDPsInGroup();
  ensureRDOSlots(n);
  for (let s = 0; s < n; s++) {
    rdoSlotsEl.appendChild(buildSlotPanel(s));
  }
}

function buildSlotPanel(slotIdx) {
  const info = getRDOSlotDP(slotIdx);
  const slot = rdoSlots[slotIdx];

  // Initialize day data for this slot (preserve existing if same DP)
  const desiredFirstDate = info.start.toDateString();
  const existingFirstDate = slot.days[0] ? slot.days[0].date.toDateString() : null;
  if (desiredFirstDate !== existingFirstDate) {
    slot.days = [];
    for (let i = 0; i < 28; i++) {
      const d = new Date(info.start);
      d.setDate(d.getDate() + i);
      slot.days.push({ date: d, state1: 'work', state2: 'work', holiday: holidayFor(d) });
    }
  }

  const slotEl = document.createElement('div');
  slotEl.className = 'rdo-slot';
  slotEl.dataset.slot = slotIdx;
  slotEl.innerHTML = `
    <div class="rdo-slot-head">
      <span class="slot-label">DP ${info.dp}</span>
      <span class="slot-dp"><span>${info.year}</span> &nbsp; ${fmtDate(info.start)} – ${fmtDate(info.end)}</span>
      <button type="button" class="apply-all-btn" data-slot="${slotIdx}" title="Copy this DP's selections to all other DPs">Apply to all DPs</button>
    </div>
    <div class="rdo-slot-body">
      <div class="rdo-info">
        <div class="info-block">
          <div class="stat stat-rdo1 view-target" data-view-target="1" title="Click to view 1st choice"><span class="stat-label-prefix first"></span><span class="num">0</span>/12 RDO (1st)</div>
          <div class="stat stat-rdo2 view-target" data-view-target="2" title="Click to view 2nd choice"><span class="stat-label-prefix second"></span><span class="num">0</span>/12 RDO (2nd, optional)</div>
          <div class="stat"><span class="num stat-vac">0/0</span>VC (1st/2nd)</div>
        </div>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="swatch rdo wide">RDO</span>1st RDO</div>
        <div class="legend-item"><span class="swatch vac">VC</span>1st Vac</div>
        <div class="legend-item"><span class="swatch rdo2 wide">RDO</span>2nd RDO</div>
        <div class="legend-item"><span class="swatch vac2">VC</span>2nd Vac</div>
        <div class="legend-item"><span class="swatch holiday">$</span>MOU 30/39 Paid Holiday</div>
        <div class="legend-item"><span class="swatch fed-holiday">FED</span>Federal (unpaid)</div>
        <div class="legend-item" style="font-style: italic; color: var(--ink-soft);">Long-press / right-click for T · M/L · H · JD · FL · SK</div>
      </div>
      <div class="calendar">
        <div class="day-head">Sun</div>
        <div class="day-head">Mon</div>
        <div class="day-head">Tue</div>
        <div class="day-head">Wed</div>
        <div class="day-head">Thu</div>
        <div class="day-head">Fri</div>
        <div class="day-head">Sat</div>
      </div>
    </div>
  `;

  // Wire RDO counters as view targets.
  // Click logic:
  //   - inactive counter while only the OTHER is active → both become active (split view)
  //   - inactive counter while NEITHER is active → that one becomes active (single view)
  //   - active counter while in BOTH view → drops to single view of the OTHER counter
  //   - active counter while in single view → no change (don't allow turning off both)
  slotEl.querySelectorAll('.view-target').forEach(target => {
    target.addEventListener('click', () => {
      const t = target.dataset.viewTarget; // '1' or '2'
      const cur = slot.view;
      let next = cur;
      if (t === '1') {
        if (cur === '1') next = '1'; // already active alone
        else if (cur === '2') next = 'both';
        else if (cur === 'both') next = '2'; // dropping 1st keeps 2nd alone
      } else { // t === '2'
        if (cur === '2') next = '2';
        else if (cur === '1') next = 'both';
        else if (cur === 'both') next = '1';
      }
      slot.view = next;
      paintViewTargets(slotIdx);
      applyViewClass(slotIdx);
    });
  });

  // Initial highlight
  setTimeout(() => paintViewTargets(slotIdx), 0);

  // Build day cells
  const calendar = slotEl.querySelector('.calendar');
  slot.days.forEach((cd, idx) => {
    const cell = document.createElement('div');
    const dow = cd.date.getDay();
    cell.className = 'day';
    if (dow === 0 || dow === 6) cell.classList.add('weekend');
    if (cd.holiday) {
      cell.classList.add('is-holiday');
      if (cd.holiday.paid) cell.classList.add('is-paid-holiday');
    }
    cell.dataset.idx = idx;
    const showDollar = cd.holiday && cd.holiday.paid;
    cell.innerHTML = `
      <div class="layer-1"></div>
      <div class="layer-2"></div>
      <div class="date">${MONTHS[cd.date.getMonth()]}</div>
      <div class="num">${cd.date.getDate()}</div>
      <div class="mark"></div>
      <div class="mark-1"></div>
      <div class="mark-2"></div>
      ${showDollar ? `<div class="holiday-mark" title="${cd.holiday.name} (paid)">$</div>` : ''}
      ${cd.holiday ? `<div class="holiday-name" title="${cd.holiday.name}">${cd.holiday.name}</div>` : ''}
      <div class="day-half-top" title="1st choice"></div>
      <div class="day-half-bot" title="2nd choice"></div>
    `;
    // Helper: returns the choice (1 or 2) that this half-cell controls based on view.
    const choiceForHalf = (which /* 'top' | 'bot' */) => {
      const v = slot.view;
      if (which === 'top') return (v === '1' || v === 'both') ? 1 : 2;
      else return (v === '2' || v === 'both') ? 2 : 1;
    };
    const wireHalf = (halfEl, which) => {
      let pressTimer = null;
      let pressFired = false;
      const LONG_PRESS_MS = 500;

      // Click / tap → cycle (only if a long-press didn't already fire)
      halfEl.addEventListener('click', e => {
        e.stopPropagation();
        if (pressFired) { pressFired = false; return; }
        cycleDay(slotIdx, idx, choiceForHalf(which));
      });

      // Right-click on desktop → context menu
      halfEl.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        showCtxMenu(e.clientX, e.clientY, slotIdx, idx, choiceForHalf(which));
      });

      // Touch long-press on mobile
      halfEl.addEventListener('touchstart', e => {
        pressFired = false;
        const touch = e.touches[0];
        const x = touch.clientX, y = touch.clientY;
        pressTimer = setTimeout(() => {
          pressFired = true;
          showCtxMenu(x, y, slotIdx, idx, choiceForHalf(which));
        }, LONG_PRESS_MS);
      }, { passive: true });
      const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
      halfEl.addEventListener('touchend', cancelPress);
      halfEl.addEventListener('touchmove', cancelPress);
      halfEl.addEventListener('touchcancel', cancelPress);
    };
    wireHalf(cell.querySelector('.day-half-top'), 'top');
    wireHalf(cell.querySelector('.day-half-bot'), 'bot');
    calendar.appendChild(cell);
  });

  // Wire up the "Apply to all DPs" button: copies this slot's selections to all
  // other slots, respecting the slot's current view (1st choice / 2nd choice / both).
  const applyAllBtn = slotEl.querySelector('.apply-all-btn');
  if (applyAllBtn) {
    applyAllBtn.addEventListener('click', () => {
      const sourceSlot = rdoSlots[slotIdx];
      const view = sourceSlot.view; // '1', '2', or 'both'
      // Snapshot the source's day-by-day states so the copy stays consistent if
      // the user has the calendar mid-paint.
      const sourceStates = sourceSlot.days.map(d => ({ state1: d.state1, state2: d.state2 }));
      let copiedCount = 0;
      for (let i = 0; i < rdoSlots.length; i++) {
        if (i === slotIdx) continue;
        const target = rdoSlots[i];
        for (let j = 0; j < target.days.length && j < sourceStates.length; j++) {
          if (view === '1') {
            target.days[j].state1 = sourceStates[j].state1;
          } else if (view === '2') {
            target.days[j].state2 = sourceStates[j].state2;
          } else { // 'both'
            target.days[j].state1 = sourceStates[j].state1;
            target.days[j].state2 = sourceStates[j].state2;
          }
        }
        copiedCount++;
      }
      // Refresh all slot UIs to reflect the new state.
      rdoSlots.forEach((_, i) => {
        rdoSlots[i].days.forEach((_, j) => refreshDayCell(i, j));
        updateStats(i);
      });
      const label = view === '1' ? '1st choice' : view === '2' ? '2nd choice' : 'both choices';
      toast(`Applied DP ${getRDOSlotDP(slotIdx).dp} ${label} to ${copiedCount} other DP${copiedCount === 1 ? '' : 's'}`);
    });
  }

  // Apply view class & paint after a microtask so the element exists in DOM
  setTimeout(() => {
    applyViewClass(slotIdx);
    updateStats(slotIdx);
  }, 0);

  return slotEl;
}

/* ============================================================
   DAY STATE DEFINITIONS
   Each calendar half-cell holds one of these states.
   Tap cycles through the 3 primary states (work → rdo → vac → work).
   Long-press / right-click opens the context menu for the 5 less-common ones.
   ============================================================ */
const STATE_DEFS = [
  // code,  ui label, pdf symbol, full name,           css fill class
  ['work', '',       '',         'Clear',              null],
  ['rdo',  'RDO',    'O',        'Regular Day Off',    'fill-rdo'],
  ['vac',  'VC',     'V',        'Vacation',           'fill-vac'],
  ['t',    'T',      'T',        'Training',           'fill-other'],
  ['ml',   'M/L',    'M/L',      'Military Leave',     'fill-other'],
  ['h',    'H',      'H',        'Holiday',            'fill-other'],
  ['jd',   'JD',     'JD',       'Jury Duty',          'fill-other'],
  ['fl',   'FL',     'FL',       'Family Leave',       'fill-other'],
  ['sk',   'SK',     'SK',       'Sick',               'fill-other'],
];
const STATE_BY_CODE = Object.fromEntries(STATE_DEFS.map(s => [s[0], { label: s[1], pdfSym: s[2], name: s[3], fill: s[4] }]));
function stateLabel(code) { return STATE_BY_CODE[code]?.label || ''; }
function statePdfSym(code) { return STATE_BY_CODE[code]?.pdfSym || ''; }
function stateFill(code) { return STATE_BY_CODE[code]?.fill || null; }

// Context menu: codes shown when long-pressing / right-clicking a half-cell.
// T (Training) at top, then M/L, etc.; "Clear" at bottom resets to work.
const CTX_MENU_CODES = ['t', 'ml', 'h', 'jd', 'fl', 'sk', 'work'];

function cycleDay(slotIdx, idx, choice) {
  const cd = rdoSlots[slotIdx].days[idx];
  const key = (choice === 1) ? 'state1' : 'state2';
  const cur = cd[key];
  // If cell is in an "other" state (ml/h/jd/fl/sk), tap clears back to work.
  // Otherwise cycle work → rdo → vac → work.
  if (cur === 'work') cd[key] = 'rdo';
  else if (cur === 'rdo') cd[key] = 'vac';
  else if (cur === 'vac') cd[key] = 'work';
  else cd[key] = 'work'; // any "other" state → clear
  refreshDayCell(slotIdx, idx);
  updateStats(slotIdx);
}

function setDayState(slotIdx, idx, choice, newState) {
  const cd = rdoSlots[slotIdx].days[idx];
  const key = (choice === 1) ? 'state1' : 'state2';
  cd[key] = newState;
  refreshDayCell(slotIdx, idx);
  updateStats(slotIdx);
}

/* Single shared context menu instance; positioned per click */
let ctxMenuEl = null;
function ensureCtxMenu() {
  if (ctxMenuEl) return ctxMenuEl;
  ctxMenuEl = document.createElement('div');
  ctxMenuEl.className = 'ctx-menu hidden';
  document.body.appendChild(ctxMenuEl);
  document.addEventListener('click', e => {
    if (ctxMenuEl && !ctxMenuEl.contains(e.target)) hideCtxMenu();
  });
  return ctxMenuEl;
}
function hideCtxMenu() {
  if (ctxMenuEl) ctxMenuEl.classList.add('hidden');
}
function showCtxMenu(x, y, slotIdx, idx, choice) {
  const menu = ensureCtxMenu();
  menu.innerHTML = '';
  CTX_MENU_CODES.forEach(code => {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = 'ctx-item' + (code === 'work' ? ' ctx-clear' : '');
    const def = STATE_BY_CODE[code];
    item.innerHTML = `<span class="ctx-label">${def.label || '—'}</span><span class="ctx-name">${def.name}</span>`;
    item.addEventListener('click', e => {
      e.stopPropagation();
      setDayState(slotIdx, idx, choice, code);
      hideCtxMenu();
    });
    menu.appendChild(item);
  });
  // Position; clamp to viewport
  menu.classList.remove('hidden');
  const rect = menu.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  let nx = x, ny = y;
  if (nx + rect.width > vw - 4) nx = vw - rect.width - 4;
  if (ny + rect.height > vh - 4) ny = vh - rect.height - 4;
  if (nx < 4) nx = 4;
  if (ny < 4) ny = 4;
  menu.style.left = nx + 'px';
  menu.style.top = ny + 'px';
}

function refreshDayCell(slotIdx, idx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const cell = slotEl.querySelector(`.day[data-idx="${idx}"]`);
  if (!cell) return;
  const cd = rdoSlots[slotIdx].days[idx];

  // Reset all per-state classes
  cell.classList.remove(
    's1-rdo','s1-vac','s1-other',
    's2-rdo','s2-vac','s2-other'
  );
  // State1 class
  if (cd.state1 === 'rdo') cell.classList.add('s1-rdo');
  else if (cd.state1 === 'vac') cell.classList.add('s1-vac');
  else if (cd.state1 !== 'work') cell.classList.add('s1-other');
  // State2 class
  if (cd.state2 === 'rdo') cell.classList.add('s2-rdo');
  else if (cd.state2 === 'vac') cell.classList.add('s2-vac');
  else if (cd.state2 !== 'work') cell.classList.add('s2-other');

  // Layer fill classes
  const l1 = cell.querySelector('.layer-1');
  l1.className = 'layer-1';
  const l1Fill = stateFill(cd.state1);
  if (l1Fill) l1.classList.add(l1Fill);
  const l2 = cell.querySelector('.layer-2');
  l2.className = 'layer-2';
  const l2Fill = stateFill(cd.state2);
  if (l2Fill) l2.classList.add(l2Fill);

  const v = rdoSlots[slotIdx].view;
  cell.querySelector('.mark').textContent =
    v === '1' ? stateLabel(cd.state1) :
    v === '2' ? stateLabel(cd.state2) : '';
  cell.querySelector('.mark-1').textContent = stateLabel(cd.state1);
  cell.querySelector('.mark-2').textContent = stateLabel(cd.state2);

  const num = cell.querySelector('.num');
  const date = cell.querySelector('.date');
  // Date and day number live in the TOP half of the cell. Only color them white when the
  // top half actually has a fill (state1 set). If only state2 is set, the top half is still
  // unfilled white/parchment, so keep the text dark for visibility.
  const topFilled = cd.state1 !== 'work';
  num.classList.toggle('has-fill', topFilled);
  date.classList.toggle('has-fill', topFilled);
}

function applyViewClass(slotIdx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const v = rdoSlots[slotIdx].view;
  slotEl.querySelectorAll('.day').forEach(cell => {
    cell.classList.remove('v-1', 'v-2', 'v-both');
    if (v === '1') cell.classList.add('v-1');
    else if (v === '2') cell.classList.add('v-2');
    else cell.classList.add('v-both');
  });
  rdoSlots[slotIdx].days.forEach((_, i) => refreshDayCell(slotIdx, i));
}

function paintViewTargets(slotIdx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const v = rdoSlots[slotIdx].view;
  const t1 = slotEl.querySelector('.view-target[data-view-target="1"]');
  const t2 = slotEl.querySelector('.view-target[data-view-target="2"]');
  if (t1) t1.classList.toggle('view-active', v === '1' || v === 'both');
  if (t2) t2.classList.toggle('view-active', v === '2' || v === 'both');
}

function updateStats(slotIdx) {
  const slotEl = rdoSlotsEl.querySelector(`.rdo-slot[data-slot="${slotIdx}"]`);
  if (!slotEl) return;
  const days = rdoSlots[slotIdx].days;
  const o1 = days.filter(d => d.state1 === 'rdo').length;
  const v1 = days.filter(d => d.state1 === 'vac').length;
  const o2 = days.filter(d => d.state2 === 'rdo').length;
  const v2 = days.filter(d => d.state2 === 'vac').length;
  const stat1 = slotEl.querySelector('.stat-rdo1');
  stat1.querySelector('.num').textContent = o1;
  stat1.classList.toggle('warn', o1 !== 0 && o1 !== 12);
  stat1.classList.toggle('ok', o1 === 12);
  const stat2 = slotEl.querySelector('.stat-rdo2');
  stat2.querySelector('.num').textContent = o2;
  stat2.classList.toggle('warn', o2 !== 0 && o2 !== 12);
  stat2.classList.toggle('ok', o2 === 12);
  slotEl.querySelector('.stat-vac').textContent = `${v1}/${v2}`;
}

function resetRDO() {
  rdoSlots.forEach(slot => {
    slot.days.forEach(d => { d.state1 = 'work'; d.state2 = 'work'; });
  });
  rdoSlots.forEach((_, i) => {
    rdoSlots[i].days.forEach((_, j) => refreshDayCell(i, j));
    updateStats(i);
  });
  toast('All RDO days cleared');
}

buildAllSlots();

/* ============================================================
   PERSIST OFFICER INFO ACROSS SESSIONS
   Saves to localStorage so the form repopulates on next visit.
   Synced fields: name, currentWatch, serial, rank
   ============================================================ */
const OFFICER_STORAGE_KEY = 'laapd-bid-officer-v1';

function readOfficer() {
  try {
    const raw = localStorage.getItem(OFFICER_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function writeOfficer(patch) {
  try {
    const cur = readOfficer() || {};
    const merged = { ...cur, ...patch };
    localStorage.setItem(OFFICER_STORAGE_KEY, JSON.stringify(merged));
  } catch (e) {
    // localStorage may be unavailable (private browsing); silently fail
  }
}

// Apply saved officer info to all relevant fields
function applyOfficerToFields() {
  const data = readOfficer();
  if (!data) return;
  const setIfEmpty = (id, val) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (val == null || val === '') return;
    if (el.tagName === 'SELECT') {
      // Only set if value is a valid option
      const has = Array.from(el.options).some(o => o.value === val);
      if (has) el.value = val;
    } else {
      el.value = val;
    }
  };
  // Watch form
  setIfEmpty('w-name', data.name);
  setIfEmpty('w-curwatch', data.currentWatch);
  setIfEmpty('w-serial', data.serial);
  setIfEmpty('w-rank', data.rank);
  // RDO form (uses same name/serial; r-watch maps to currentWatch)
  setIfEmpty('r-name', data.name);
  setIfEmpty('r-serial', data.serial);
  setIfEmpty('r-watch', data.currentWatch);
}

// Wire up listeners that mirror changes between forms and persist.
function wireOfficerSync() {
  const fields = [
    // [elementId, storageKey, mirrorIds]
    ['w-name', 'name', ['r-name']],
    ['r-name', 'name', ['w-name']],
    ['w-serial', 'serial', ['r-serial']],
    ['r-serial', 'serial', ['w-serial']],
    ['w-curwatch', 'currentWatch', ['r-watch']],
    ['r-watch', 'currentWatch', ['w-curwatch']],
    ['w-rank', 'rank', []]
  ];
  fields.forEach(([id, key, mirrors]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const handler = () => {
      const val = el.value;
      writeOfficer({ [key]: val });
      mirrors.forEach(mid => {
        const m = document.getElementById(mid);
        if (!m) return;
        if (m.tagName === 'SELECT') {
          const has = Array.from(m.options).some(o => o.value === val);
          if (has) m.value = val;
          else if (val === '') m.value = '';
        } else {
          m.value = val;
        }
      });
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

applyOfficerToFields();
wireOfficerSync();

function forgetOfficer() {
  if (!confirm('Clear saved name, serial, rank, and watch from this device?')) return;
  try { localStorage.removeItem(OFFICER_STORAGE_KEY); } catch (e) {}
  ['w-name','w-serial','w-curwatch','w-rank','r-name','r-serial','r-watch'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.tagName === 'SELECT') {
      // For w-curwatch, there's an empty option; for others we'll just default to first option
      const empty = Array.from(el.options).find(o => o.value === '');
      if (empty) el.value = '';
      else if (id === 'w-rank') el.value = 'Officer';
      else el.value = el.options[0].value;
    } else {
      el.value = '';
    }
  });
  toast('Saved officer info cleared');
}
const toastEl = document.getElementById('toast');
function toast(msg, isError) {
  toastEl.textContent = msg;
  toastEl.classList.toggle('error', !!isError);
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 3200);
}

/* ============================================================
   PDF GENERATION — APD Form 086
   Faithful black-and-white reproduction of the official form.
   Layout (portrait letter, 612 × 792 pt):
     - Title block: "LOS ANGELES AIRPORT POLICE" / "WATCH/DAYS-OFF BID REQUEST"
     - Officer info row: LAST NAME/SERIAL | WATCH | DP#(s) | DP START | DP END
     - Subtitle line: "MARK FIRST AND SECOND CHOICE OF WATCH ASSIGNMENT OR DAYS OFF"
     - Choice row: 1ST CHOICE | 2ND CHOICE | SUPERVISOR'S INITIALS | DATE RECEIVED
     - Day grid: SU M TU W TH F SA × 4 column headers (= 28 cols)
                 Date row(s) — one per DP (3 for watch, 1 for RDO)
                 Mark row(s) — same count as date rows
     - Footer: APD FORM 086 (left) | Symbols legend (right)
   ============================================================ */
const { jsPDF } = window.jspdf;

// ------- shared layout constants --------
const PG_W = 612;
const PG_H = 792;
const PAGE_MARGIN = 18;
const BORDER_GRAY = 90;     // line color for table borders
const FAINT_FILL = 220;     // weekend column shading on PDF — slightly darker for visibility
const WATERMARK_GRAY = 211; // text watermark color (WATCH BID letters, holiday codes) —
                            // slightly darker than FAINT_FILL so the letters read while
                            // still feeling like a faint background mark.


// ----------------- COMBINED APD-086 PDF -----------------
// One portrait page with 4 stacked APD-086 forms:
//   1) Watch BID (3-DP combined, 1st/2nd watch choice in top boxes)
//   2) 1st DP (single 28-day grid, marks from rdoSlots[0])
//   3) 2nd DP (single 28-day grid, marks from rdoSlots[1])
//   4) 3rd DP (single 28-day grid, marks from rdoSlots[2])
// Both the Watch and RDO buttons call this same function.

function generateCombinedPDF() {
  const name = (document.getElementById('w-name').value || document.getElementById('r-name').value).trim();
  const serial = (document.getElementById('w-serial').value || document.getElementById('r-serial').value).trim();
  const curWatch = document.getElementById('w-curwatch').value || document.getElementById('r-watch').value || '';
  const rank = document.getElementById('w-rank').value || 'Officer';
  const rankAbbr = rank === 'Sergeant' ? 'Sgt.' : 'Ofcr.';
  const nameWithRank = `${rankAbbr} ${name}`;

  if (!name) return toast('Officer name required', true);
  if (!serial) return toast('Serial number required', true);
  if (!/^\d{5}$/.test(serial)) return toast('Serial must be exactly 5 digits', true);

  const numDPs = numDPsInGroup();

  // Validate selections.
  // 1st choice is required when a DP has any selections — must be exactly 12 RDOs.
  // 2nd choice is OPTIONAL — only validate if the user entered any 2nd-choice marks.
  for (let s = 0; s < numDPs; s++) {
    const slot = rdoSlots[s];
    const has1 = slot.days.some(d => d.state1 !== 'work');
    const has2 = slot.days.some(d => d.state2 !== 'work');
    if (!has1 && !has2) continue;
    if (has1) {
      const o1 = slot.days.filter(d => d.state1 === 'rdo').length;
      if (o1 !== 12) return toast(`DP ${getRDOSlotDP(s).dp}: 1st choice needs 12 RDOs (has ${o1})`, true);
    }
    if (has2) {
      const o2 = slot.days.filter(d => d.state2 === 'rdo').length;
      if (o2 !== 12) return toast(`DP ${getRDOSlotDP(s).dp}: 2nd choice needs 12 RDOs (has ${o2})`, true);
    }
  }

  // Determine the DPs in the selected group (single mode) or full year (fullYear mode).
  let dpStart, yrStart;
  if (isFullYear()) {
    dpStart = 1;
    yrStart = +wYearSel.value;
  } else {
    [dpStart, yrStart] = wStartDP.value.split('-').map(Number);
  }
  const dps = [];
  for (let i = 0; i < numDPs; i++) {
    let curDP = dpStart + i;
    let curYr = yrStart;
    if (curDP > 13) { curDP -= 13; curYr += 1; }
    dps.push(getDPInfo(curDP, curYr));
  }

  // Watch choices: in single mode, one pair {c1, c2}. In fullYear mode, four pairs
  // (one per group: 1-3, 4-6, 7-9, 10-13). For email subject and "hasWatchBid" we
  // collapse fullYear to a "did the officer set ANY watch picks?" question.
  let watch1, watch2, hasWatchBid;
  if (isFullYear()) {
    hasWatchBid = watchStateGroups.some(g => g.c1 != null || g.c2 != null);
    // Composite labels reflecting all four group picks (used only as a fallback;
    // the per-slip rendering in full-year mode draws each group's choices directly).
    watch1 = watchStateGroups.map(g => g.c1 != null ? `W${g.c1}` : '—').join('/');
    watch2 = watchStateGroups.map(g => g.c2 != null ? `W${g.c2}` : '—').join('/');
  } else {
    watch1 = watchState.c1 != null ? `Watch ${watchState.c1}` : '';
    watch2 = watchState.c2 != null ? `Watch ${watchState.c2}` : '';
    hasWatchBid = watch1 !== '' || watch2 !== '';
  }
  const symFor = (s) => statePdfSym(s);

  // Determine which forms to render.
  //  - Watch BID slip prints only if at least one watch choice (1st or 2nd) is set.
  //  - DPs are included only if they have any RDO/VC selections.
  const includedDPs = []; // array of slot indices
  for (let s = 0; s < numDPs; s++) {
    const slot = rdoSlots[s];
    if (slot.days.some(d => d.state1 !== 'work' || d.state2 !== 'work')) {
      includedDPs.push(s);
    }
  }

  // Edge case: if nothing is selected, still generate a (mostly empty) PDF and skip
  // the email/share flow entirely. Just download the file. The flag below tells the
  // share routine downstream to bypass email prep.
  const isEmptyBid = !hasWatchBid && includedDPs.length === 0;

  const doc = new jsPDF({ unit: 'pt', format: 'letter', orientation: 'portrait' });

  // Per-slip heights — sized just tall enough for content + legend without leaving
  // empty space below.
  // Per-slip heights. Watch BID is 4 cell rows for both 3-DP and 4-DP groups (the
  // 4-DP case merges the 4th DP's dates into the label row). RDO slips are 5 rows.
  const FORM_H_WATCH = 173;
  const FORM_H_RDO = 186;

  // Helper: pad mark rows to a target count. Original APD-086:
  //   Watch BID slip = 3 date rows + 1 mark row (the W·A·T·C·H_B·I·D label) = 4 cell rows
  //   RDO slip       = 1 date row + 4 mark rows                             = 5 cell rows
  const padMarks = (markRows, targetCount) => {
    const out = markRows.slice(0, targetCount);
    while (out.length < targetCount) out.push(new Array(28).fill(''));
    return out;
  };

  // Mark row spells out "WATCH BID" with one letter per cell, exactly as on the sample form.
  // Letters at cell indices: 8=W, 9=A, 10=T, 11=C, 12=H, gap at 13-14, 15=B, 16=I, 17=D
  // (BID shifted right by 1 cell so the 'B' falls on Monday, not the shaded Sunday column).
  const watchBidLabelRow = new Array(28).fill('');
  ['W','A','T','C','H'].forEach((ch, i) => watchBidLabelRow[8 + i] = ch);
  ['B','I','D'].forEach((ch, i) => watchBidLabelRow[15 + i] = ch);

  // Build the slip list with page-break support. Each slip records its y, h, and
  // page so the cut-here lines and per-page holiday legend can be placed correctly.
  // Page break: if the next slip would extend below the page bottom, we addPage()
  // and reset cy to the top margin.
  const slips = []; // { y, h, page }
  const pageTopY = PAGE_MARGIN + 4;
  // Reserve bottom space for the holiday legend. Legend baseline 5pt below last
  // slip + ~3pt text below baseline = 8pt minimum. Allows 4-DP groups to pack
  // Watch + 3 RDO on page 1 with the 1.5pt internal-clearance preserved.
  const reservedBottom = 8;
  let cy = pageTopY;
  let pageIdx = 0;

  const addSlip = (h, drawFn, forceNewPage) => {
    if (forceNewPage && slips.length > 0) {
      doc.addPage();
      pageIdx += 1;
      cy = pageTopY;
    } else if (cy + h > PG_H - reservedBottom) {
      doc.addPage();
      pageIdx += 1;
      cy = pageTopY;
    }
    drawFn(cy);
    slips.push({ y: cy, h, page: pageIdx });
    cy += h;
  };

  // Helper: build a Watch BID slip for a specific group of DPs. Used both for the
  // single-period Watch BID slip and for each of the 4 mini-slips on a full-year
  // Watch BID page.
  const drawWatchBidSlip = (slipY, slipH, groupDPs, choice1, choice2) => {
    const allDateRows = groupDPs.map(info => {
      const arr = [];
      for (let i = 0; i < 28; i++) {
        const d = new Date(info.start);
        d.setDate(d.getDate() + i);
        arr.push(d);
      }
      return arr;
    });
    // Layout differs by group size:
    //  • 3-DP groups: 3 date rows + 1 dedicated label row (4 total rows). Label
    //    row letters render in light gray.
    //  • 4-DP groups: 3 date rows + 1 hybrid row (DP4 dates merged with the
    //    WATCH BID label letters). Total still 4 rows.
    let dateRows, dateRowLabels, markRows, shadedMarkRowIdxs;
    if (groupDPs.length === 4) {
      dateRows = allDateRows;
      dateRowLabels = [null, null, null, watchBidLabelRow];
      markRows = padMarks([], 0);
      shadedMarkRowIdxs = null;
    } else {
      dateRows = allDateRows;
      dateRowLabels = null;
      markRows = padMarks([ watchBidLabelRow ], 1);
      shadedMarkRowIdxs = [0];
    }
    drawAPD086(doc, slipY, slipH, {
      name: nameWithRank, serial, curWatch,
      dpHeader: 'DP#s',
      dpRange: `${groupDPs[0].dp} - ${groupDPs[groupDPs.length - 1].dp}`,
      startDate: fmtMDDYYYY(groupDPs[0].start),
      endDate: fmtMDDYYYY(groupDPs[groupDPs.length - 1].end),
      firstChoice: choice1,
      secondChoice: choice2,
      dateRows,
      dateRowLabels,
      showLegend: true,
      markRows,
      shadedMarkRowIdxs
    });
  };

  if (isFullYear()) {
    // FULL-YEAR MODE: page 1 has 4 Watch BID mini-slips (one per DP group).
    // RDO pages: each DP gets its own page.
    if (hasWatchBid || isEmptyBid) {
      // Group DPs into the four year-quarter groups: 1-3, 4-6, 7-9, 10-13.
      const groupRanges = [[1, 3], [4, 6], [7, 9], [10, 13]];
      groupRanges.forEach((range, groupIdx) => {
        const [first, last] = range;
        const groupDPs = dps.filter(info => info.dp >= first && info.dp <= last);
        const gState = watchStateGroups[groupIdx];
        const c1 = gState.c1 != null ? `Watch ${gState.c1}` : '';
        const c2 = gState.c2 != null ? `Watch ${gState.c2}` : '';
        addSlip(FORM_H_WATCH, (slipY) => {
          drawWatchBidSlip(slipY, FORM_H_WATCH, groupDPs, c1, c2);
        });
      });
    }
  } else {
    // SINGLE-PERIOD MODE: one Watch BID slip covering all DPs in the chosen group.
    if (hasWatchBid || isEmptyBid) {
      addSlip(FORM_H_WATCH, (slipY) => {
        drawWatchBidSlip(slipY, FORM_H_WATCH, dps, watch1, watch2);
      });
    }
  }

  // RDO slips: included DPs, OR all DPs in empty-bid hand-fill mode.
  // RDO forms: 1st/2nd CHOICE boxes left blank — they are only used on the Watch BID.
  // In full-year mode, force a page break before each RDO slip (one DP per page).
  const dpIndicesToPrint = isEmptyBid
    ? Array.from({ length: numDPs }, (_, i) => i)
    : includedDPs;
  dpIndicesToPrint.forEach((slotIdx, idxInList) => {
    const slot = rdoSlots[slotIdx];
    const info = dps[slotIdx];
    // In full-year mode, every RDO slip starts a new page (one DP per page).
    // The very first RDO slip also forces a page break unless there's no Watch BID
    // slip preceding it (in that case the natural top-of-document position is fine).
    const forceNewPage = isFullYear() && (slips.length > 0);
    addSlip(FORM_H_RDO, (slipY) => {
      drawAPD086(doc, slipY, FORM_H_RDO, {
        name: nameWithRank, serial, curWatch,
        dpHeader: 'DP#',
        dpRange: String(info.dp),
        startDate: fmtMDDYYYY(info.start),
        endDate: fmtMDDYYYY(info.end),
        firstChoice: '',
        secondChoice: '',
        dateRows: [ slot.days.map(d => d.date) ],
        // Per-slip mini legend at the bottom — RDO slips only (Watch BID slip omits it).
        showLegend: true,
        // Rows 2 & 3 (0-indexed) carry holiday markers — drawn in gray, not black.
        holidayRowIdxs: [2, 3],
        // Stash the slot index so we can correlate slips back to DPs for the
        // per-page holiday legend below.
        _slotIdx: slotIdx,
        markRows: (() => {
          const rows = [ slot.days.map(d => symFor(d.state1)) ];
          const has2 = slot.days.some(d => d.state2 !== 'work');
          if (has2) rows.push(slot.days.map(d => symFor(d.state2)));
          const padded = padMarks(rows, 4);
          // Holiday markers — applied to EVERY RDO slip (real bids and BLANK alike).
          // Row 3 gets a 2-letter code for any holiday in that column. Row 4 gets a "$"
          // under each paid (MOU 30/39) holiday. State1/state2 marks live on rows 1-2,
          // so holidays never collide with the officer's selections.
          padded[2] = slot.days.map(d => holidayCodeFor(d.date));
          padded[3] = slot.days.map(d => {
            const h = holidayFor(d.date);
            return h && h.paid ? '$' : '';
          });
          return padded;
        })()
      });
    }, forceNewPage);
    // Tag the just-added slip with which DP slot it represents.
    slips[slips.length - 1].slotIdx = slotIdx;
  });

  // Dashed "cut here" line at each slip boundary (between adjacent slips on the
  // SAME page only — never across page breaks, since the bottom of a page already
  // serves as a natural boundary).
  for (let i = 0; i < slips.length - 1; i++) {
    if (slips[i].page !== slips[i + 1].page) continue;
    doc.setPage(slips[i].page + 1); // jsPDF pages are 1-indexed
    const lineY = slips[i].y + slips[i].h;
    doc.setLineDashPattern([3, 3], 0);
    doc.setDrawColor(140, 140, 140);
    doc.setLineWidth(0.5);
    doc.line(PAGE_MARGIN + 6, lineY, PG_W - PAGE_MARGIN - 6, lineY);
    doc.setLineDashPattern([], 0);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(140, 140, 140);
    const labelText = '✂  cut here';
    const labelW = doc.getTextWidth(labelText) + 8;
    doc.setFillColor(255, 255, 255);
    doc.rect((PG_W - labelW) / 2, lineY - 4, labelW, 8, 'F');
    doc.text(labelText, PG_W / 2, lineY + 2, { align: 'center' });
  }

  // Per-page holiday legend — placed below the last slip on each page, listing only
  // the holidays whose dates appear in slips on that same page.
  const compactHolidayNames = {
    "New Year's Day":   "New Year Day",
    "MLK Jr. Day":      "MLK Day",
    "Presidents' Day":  "Presidents' Day",
    "Easter Sunday":    "Easter",
    "Memorial Day":     "Memorial Day",
    "Juneteenth":       "Juneteenth",
    "Independence Day": "Independence Day",
    "Labor Day":        "Labor Day",
    "Columbus Day":     "Columbus Day",
    "Veteran's Day":    "Veterans Day",
    "Thanksgiving Day": "Thanksgiving Day",
    "Christmas Eve":    "Christmas Eve",
    "Christmas Day":    "Christmas Day",
    "New Year's Eve":   "NYE",
  };
  // Group slips by page index, then for each page collect holidays in the printed
  // RDO slips on that page (Watch BID slip dates aren't counted since that slip
  // doesn't render holiday markers in its mark row).
  const slipsByPage = {};
  slips.forEach(s => {
    (slipsByPage[s.page] = slipsByPage[s.page] || []).push(s);
  });
  Object.keys(slipsByPage).forEach(pageStr => {
    const page = Number(pageStr);
    const pageSlips = slipsByPage[page];
    const lastSlip = pageSlips[pageSlips.length - 1];
    const legendY = lastSlip.y + lastSlip.h + 5;
    const seen = new Set();
    let anyPaid = false;
    pageSlips.forEach(s => {
      if (s.slotIdx === undefined) return;       // Watch BID slip (no slotIdx)
      rdoSlots[s.slotIdx].days.forEach(d => {
        const h = holidayFor(d.date);
        if (h) { seen.add(h.name); if (h.paid) anyPaid = true; }
      });
    });
    const presentEntries = HOLIDAY_CODES.filter(([name]) => seen.has(name));
    if (presentEntries.length > 0 || anyPaid) {
      const parts = [];
      if (anyPaid) parts.push('$ - Paid MOU Holiday');
      presentEntries.forEach(([n, c]) => parts.push(`${c}-${compactHolidayNames[n] || n}`));
      doc.setPage(page + 1); // jsPDF pages are 1-indexed
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.5);
      doc.setTextColor(80, 80, 80);
      doc.text(parts.join(' · '), PG_W / 2, legendY, { align: 'center' });
    }
  });

  // ---- Filename + email-subject helpers ----
  const lastName = (name || '').split(',')[0].trim() || 'unsigned';
  const rankShort = rank === 'Sergeant' ? 'Sgt' : 'Ofcr';
  const namePart = `${serial || '00000'}, ${rankShort} ${lastName}`;

  // Format a list of {dp, year} with year stated only after the LAST DP of each
  // year-run. Year-runs are groups of consecutive DPs that share the same year.
  // Within a year-run, DPs are joined with commas plus an ampersand before the last:
  //   1 DP:    "7"
  //   2 DPs:   "7 & 8"      (ampersand only)
  //   3+ DPs:  "7, 8 & 9"   (commas, ampersand before last)
  // Year-runs are joined with ", ".
  //   [{7,2026},{8,2026},{9,2026}]                   → "7, 8 & 9-2026"
  //   [{7,2026}]                                     → "7-2026"
  //   [{7,2026},{8,2026}]                            → "7 & 8-2026"
  //   [{13,2026},{1,2027},{2,2027}]                  → "13-2026, 1 & 2-2027"
  //   [{7,2026},{9,2026}] (non-contig but same year) → "7 & 9-2026"
  const formatDPGroups = (list) => {
    if (list.length === 0) return '';
    const runs = []; // each: { dps:[...], year }
    list.forEach(item => {
      const last = runs[runs.length - 1];
      if (last && last.year === item.year) last.dps.push(item.dp);
      else runs.push({ dps: [item.dp], year: item.year });
    });
    const joinDPs = (dps) => {
      if (dps.length === 1) return String(dps[0]);
      if (dps.length === 2) return `${dps[0]} & ${dps[1]}`;
      return `${dps.slice(0, -1).join(', ')} & ${dps[dps.length - 1]}`;
    };
    return runs.map(r => `${joinDPs(r.dps)}-${r.year}`).join(', ');
  };

  // Convenience for the singular-vs-plural prefix.
  const dpPrefix = (list) => list.length === 1 ? 'DP' : 'DPs';

  // Edge case: nothing was selected. Save a blank PDF using the same naming convention
  // as a Watch bid, with "BLANK Bids" instead. Skip email/share entirely.
  //   "99395, Sgt Dear, BLANK Bids for DPs 7, 8, 9-2026.pdf"
  if (isEmptyBid) {
    let earlyFilename;
    if (isFullYear()) {
      earlyFilename = `${namePart}, BLANK Full Year Bid - ${yrStart}.pdf`;
    } else {
      const allThreeEarly = dps.map(d => ({ dp: d.dp, year: d.year }));
      earlyFilename = `${namePart}, BLANK Bids for ${dpPrefix(allThreeEarly)} ${formatDPGroups(allThreeEarly)}.pdf`;
    }
    doc.save(earlyFilename);
    toast('PDF generated (no bid data)');
    return;
  }

  // Determine which DPs have RDO selections (used for filename + email routing).
  // Track each as { dp, year } so subject lines can show DP X-yyyy correctly when DPs
  // span a year boundary (e.g. DP 13/2026 & DP 1/2027).
  const rdoDPs = [];
  rdoSlots.forEach((slot, idx) => {
    if (slot.days.some(d => d.state1 !== 'work' || d.state2 !== 'work')) {
      rdoDPs.push({ dp: dps[idx].dp, year: dps[idx].year });
    }
  });
  const hasAnyRDO = rdoDPs.length > 0;

  // Build filename + email subject using the same year-only-at-end format.
  //   Watch bid:    "99395, Sgt Dear, Watch Bid for DPs 7, 8, 9-2026.pdf"
  //   RDO 1 DP:     "99395, Sgt Dear, RDO Bid for DP 7-2026.pdf"
  //   RDO 2 DPs:    "99395, Sgt Dear, RDO Bid for DPs 7, 8-2026.pdf"
  //   Year cross:   "99395, Sgt Dear, Watch Bid for DPs 13-2026, 1, 2-2027.pdf"
  //   Full year:    "99395, Sgt Dear, Full Year Watch & RDO Bid - 2027.pdf"
  let bidPart;
  if (isFullYear()) {
    bidPart = hasAnyRDO ? `Full Year Watch & RDO Bid - ${yrStart}` : `Full Year Watch Bid - ${yrStart}`;
  } else if (hasAnyRDO) {
    bidPart = `RDO Bid for ${dpPrefix(rdoDPs)} ${formatDPGroups(rdoDPs)}`;
  } else {
    const allThree = dps.map(d => ({ dp: d.dp, year: d.year }));
    bidPart = `Watch Bid for ${dpPrefix(allThree)} ${formatDPGroups(allThree)}`;
  }
  const filename = `${namePart}, ${bidPart}.pdf`;
  const subject = `${namePart}, ${bidPart}`;

  // Build recipient list based on what's in the bid:
  //  - No RDO selections (watch bid only) → PSSscheduling@lawa.org
  //  - Any RDO selections                → PatrolSchedulingWatch{N}@lawa.org for current watch
  //  - PLUS pssannualvacation@lawa.org if any DP has more than 3 VC days (in either choice)
  const recipients = [];
  if (hasAnyRDO) {
    if (curWatch === '1' || curWatch === '2' || curWatch === '3') {
      recipients.push(`PatrolSchedulingWatch${curWatch}@lawa.org`);
    } else {
      // No current watch on file — fall back to general scheduling.
      recipients.push('PSSscheduling@lawa.org');
    }
  } else {
    recipients.push('PSSscheduling@lawa.org');
  }
  // Annual vacation cc'd when any DP has 4+ VC days (in either 1st or 2nd choice).
  const anyDPHasManyVC = rdoSlots.some(slot =>
    slot.days.filter(d => d.state1 === 'vac' || d.state2 === 'vac').length > 3
  );
  if (anyDPHasManyVC) recipients.push('pssannualvacation@lawa.org');

  const body = `Submitting my Watch / Days-Off Bid for the period DP ${dps[0].dp}–${dps[dps.length - 1].dp} (${fmtMDDYYYY(dps[0].start)} – ${fmtMDDYYYY(dps[dps.length - 1].end)}).\n\nForm attached.`;

  shareOrFallbackPDF(doc, filename, recipients, subject, body);
}

// Email handoff strategy:
//   • Mobile (Web Share API with file support) → share sheet with PDF attached;
//     recipient is passed via `text` field. If the user cancels, we still open mailto
//     so they get the recipient pre-filled in the To: field.
//   • Desktop (no file-share support) → just download the PDF locally. No mailto,
//     no email prep — the officer attaches and addresses manually from their mail app.
async function shareOrFallbackPDF(doc, filename, recipients, subject, body) {
  const blob = doc.output('blob');
  const file = new File([blob], filename, { type: 'application/pdf' });

  // Detect if we're on an actual mobile device. Web Share API on desktop browsers
  // (Chrome on Windows in particular) reports support but routes through OS share
  // dialogs that mishandle file attachments — producing "no_name" errors when sent
  // to mail clients. Restricting to true mobile UAs avoids this.
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

  if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        files: [file],
        title: subject,
        text: `To: ${recipients.join(', ')}\n\n${body}`
      });
      toast('PDF ready to send');
      return;
    } catch (err) {
      // User cancelled the share sheet OR an error — fall through to mailto so they
      // still get the recipient pre-filled in To:.
      const mailto = `mailto:${encodeURIComponent(recipients.join(','))}` +
        `?subject=${encodeURIComponent(subject)}` +
        `&body=${encodeURIComponent(body + `\n\n(Please attach the downloaded ${filename})`)}`;
      window.location.href = mailto;
      setTimeout(() => { doc.save(filename); }, 200);
      toast('PDF downloading — attach it to the email');
      return;
    }
  }

  // Desktop (or any non-mobile context) → just download the PDF. The officer handles
  // emailing themselves.
  doc.save(filename);
  toast('PDF downloaded');
}

function generateWatchPDF() { generateCombinedPDF(); }
function generateRDOPDF() { generateCombinedPDF(); }

// Draw a single APD-086 form block at top-y `y`, occupying height `h`.
// `data` carries: name, serial, curWatch, dpHeader, dpRange, startDate, endDate,
//                 firstChoice, secondChoice, dateRows (Date[][] — one per row),
//                 markRows (string[][] — one per mark row).
function drawAPD086(doc, y, h, data) {
  const xOuter = PAGE_MARGIN;
  const wOuter = PG_W - PAGE_MARGIN * 2;

  // Double border around the form: outer rect with 6pt top/bottom inset, inner rect
  // 5pt inside the outer. Both drawn before content so content sits inside.
  const outerInsetY = 6;
  const innerOffset = 5;
  doc.setDrawColor(0);
  doc.setLineWidth(0.5);
  doc.rect(xOuter, y + outerInsetY, wOuter, h - outerInsetY * 2);
  doc.setLineWidth(0.4);
  doc.rect(xOuter + innerOffset, y + outerInsetY + innerOffset,
           wOuter - innerOffset * 2, h - outerInsetY * 2 - innerOffset * 2);

  // Content sits inside the inner border. Add a small gap (3pt) inside the inner rect.
  const contentPad = 3;
  const x = xOuter + innerOffset + contentPad;
  const w = wOuter - (innerOffset + contentPad) * 2;
  const contentTopY = y + outerInsetY + innerOffset + contentPad;
  const contentBottomY = y + h - outerInsetY - innerOffset - contentPad;

  // Compute internal row heights to fit content area.
  const titleH = 18;     // 2 lines: title + subtitle (centered, with breathing room)
  const officerH = 22;   // 5-column officer info
  const subtitleH = 12;
  const choiceH = 22;    // 4-column choice row — matches officer row height for consistency
  const headerRowH = 11; // day-of-week header
  const dateRowH = 13;
  const markRowH = 13;

  const nDateRows = data.dateRows.length;
  const nMarkRows = data.markRows.length;

  // Title (2 stacked centered lines), vertically centered in the title block.
  doc.setTextColor(0, 0, 0);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('LOS ANGELES AIRPORT POLICE', PG_W / 2, contentTopY + 7, { align: 'center' });
  doc.setFontSize(10);
  doc.text('WATCH/DAYS-OFF BID REQUEST', PG_W / 2, contentTopY + 16, { align: 'center' });
  let cy = contentTopY + titleH;

  // Officer info row (5 columns)
  drawOfficerRow(doc, x, cy, w, officerH, data);
  cy += officerH;

  // Subtitle line — centered vertically in the subtitle block.
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text('MARK FIRST AND SECOND CHOICE OF WATCH ASSIGNMENT OR DAYS OFF',
           PG_W / 2, cy + 8, { align: 'center' });
  cy += subtitleH;

  // 1ST CHOICE | 2ND CHOICE | SUPERVISOR'S INITIALS | DATE RECEIVED row
  drawChoiceRow(doc, x, cy, w, choiceH, data);
  cy += choiceH;

  // Day-of-week header (28 columns, SU M TU W TH F SA × 4)
  drawDOWHeader(doc, x, cy, w, headerRowH);
  cy += headerRowH;

  const cellW = w / 28;

  // Date rows. data.dateRowLabels (parallel to dateRows) optionally carries a
  // 28-letter label array per row; the row will overlay shaded cells with bold
  // letters (used to merge the WATCH BID label into the 4th DP date row).
  data.dateRows.forEach((dateRow, idx) => {
    const labels = data.dateRowLabels ? data.dateRowLabels[idx] : null;
    drawDateRow(doc, x, cy, w, dateRowH, cellW, dateRow, labels);
    cy += dateRowH;
  });

  // Mark rows (each row of strings becomes its own row of marks). data.holidayRowIdxs
  // (array of 0-based indices) marks which rows should render in muted gray to match
  // the weekend-shading aesthetic — used for the holiday code row and "$" row on
  // RDO slips so they don't compete visually with the officer's selections.
  // data.shadedMarkRowIdxs (set of 0-based indices) marks which rows render with
  // shaded fill behind their letters — used for the WATCH BID label row on 3-DP slips.
  const holidayIdxs = new Set(data.holidayRowIdxs || []);
  const shadedIdxs = new Set(data.shadedMarkRowIdxs || []);
  data.markRows.forEach((markRow, idx) => {
    // Holiday-marker rows render in light gray (FAINT_FILL = 220), same shade as
    // the WATCH BID label letters — they read as a watermark behind the officer's
    // actual selections.
    const color = holidayIdxs.has(idx) ? [WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY] : null;
    drawMarkRow(doc, x, cy, w, markRowH, cellW, markRow, color, shadedIdxs.has(idx));
    cy += markRowH;
  });

  // Optional per-slip mini legend, placed just above the inner bottom border.
  if (data.showLegend) {
    // Legend baseline: 3pt below the gap midpoint — shifts the APD FORM stamp and
    // legend slightly DOWN from optical center so they sit closer to (but cleanly
    // above) the inner border.
    const legendY = (cy + contentBottomY) / 2 + 3;
    // "APD FORM 086" stamp — bold, bottom-left of the slip's content area.
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(5.4);
    doc.setTextColor(70, 70, 70);
    doc.text('APD FORM 086', x + 2, legendY);
    // Centered symbol legend.
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(5.4);
    doc.setTextColor(70, 70, 70);
    const legendText = 'O-Regular Day Off · V-Vacation · T-Training · M/L-Military Leave · H-Holiday · JD-Jury Duty · FL-Family Leave · SK-Sick';
    doc.text(legendText, PG_W / 2, legendY, { align: 'center' });
  }
}

function drawOfficerRow(doc, x, y, w, rowH, data) {
  const cw = [w * 0.36, w * 0.10, w * 0.10, w * 0.22, w * 0.22];
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.6);
  doc.rect(x, y, w, rowH);
  let cx = x;
  for (let i = 0; i < cw.length - 1; i++) {
    cx += cw[i];
    doc.line(cx, y, cx, y + rowH);
  }
  const headers = ['LAST NAME, FI, SERIAL #:', 'WATCH', data.dpHeader || 'DP#s', 'DP START DATE:', 'DP END DATE:'];
  const values  = [`${data.name}  #${data.serial}`, data.curWatch || '', data.dpRange || '', data.startDate || '', data.endDate || ''];
  cx = x;
  for (let i = 0; i < cw.length; i++) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.text(headers[i], cx + 3, y + 7);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text(String(values[i]), cx + cw[i] / 2, y + rowH - 5, { align: 'center' });
    cx += cw[i];
  }
}

function drawChoiceRow(doc, x, y, w, rowH, data) {
  const cw = w / 4;
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.6);
  doc.rect(x, y, w, rowH);
  for (let i = 1; i < 4; i++) doc.line(x + cw * i, y, x + cw * i, y + rowH);
  const headers = ['1ST CHOICE', '2ND CHOICE', "SUPERVISOR'S INITIALS", 'DATE RECEIVED'];
  const values  = [data.firstChoice || '', data.secondChoice || '', '', ''];
  for (let i = 0; i < 4; i++) {
    const cx = x + cw * i;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(6.5);
    doc.text(headers[i], cx + 3, y + 8);
    if (values[i]) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.text(String(values[i]), cx + cw / 2, y + rowH - 4, { align: 'center' });
    }
  }
}

function drawDOWHeader(doc, x, y, w, rowH) {
  const cellW = w / 28;
  const dows = ['SU','M','TU','W','TH','F','SA'];
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  doc.rect(x, y, w, rowH, 'F');
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(6.5);
  doc.setTextColor(0, 0, 0);
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);
    doc.text(dows[i % 7], cx + cellW / 2, y + 7.5, { align: 'center' });
  }
}

function drawDateRow(doc, x, y, w, rowH, cellW, dateRow, labelLetters) {
  // Shade weekend columns (Sundays at i%7==0, Saturdays at i%7==6) before drawing borders.
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  for (let i = 0; i < 28; i++) {
    const dow = i % 7;
    if (dow === 0 || dow === 6) {
      doc.rect(x + cellW * i, y, cellW, rowH, 'F');
    }
  }
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);
    const d = dateRow[i];
    const hasLabel = labelLetters && labelLetters[i];

    // Pass 1: bold label letter rendered LARGE in light gray (matching the form's
    // header shading), centered in the cell. Cell itself stays white — the gray
    // is in the letter glyphs themselves.
    if (hasLabel) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY);
      doc.text(labelLetters[i], cx + cellW / 2, y + 9.5, { align: 'center' });
    }

    // Pass 2: date M/D drawn ON TOP of the gray letter. The gray letter is light
    // enough that the black date reads cleanly without an outline.
    if (d) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6);
      doc.setTextColor(0, 0, 0);
      doc.text(`${d.getMonth()+1}/${d.getDate()}`,
               cx + cellW / 2, y + 8.5, { align: 'center' });
    }
  }
}

function drawMarkRow(doc, x, y, w, rowH, cellW, markRow, textColor, shadeMarks) {
  // Shade weekend columns first (matches the date row).
  doc.setFillColor(FAINT_FILL, FAINT_FILL, FAINT_FILL);
  for (let i = 0; i < 28; i++) {
    const dow = i % 7;
    if (dow === 0 || dow === 6) {
      doc.rect(x + cellW * i, y, cellW, rowH, 'F');
    }
  }
  doc.setDrawColor(BORDER_GRAY, BORDER_GRAY, BORDER_GRAY);
  doc.setLineWidth(0.4);
  doc.rect(x, y, w, rowH);
  // shadeMarks renders the letters themselves in light gray (matching the form's
  // header shading) instead of black — used for the WATCH BID label row so it reads
  // as a visual hint rather than a bold mark. Cell fill stays white.
  let [r, g, b] = textColor || [0, 0, 0];
  if (shadeMarks) [r, g, b] = [WATERMARK_GRAY, WATERMARK_GRAY, WATERMARK_GRAY];
  for (let i = 0; i < 28; i++) {
    const cx = x + cellW * i;
    if (i > 0) doc.line(cx, y, cx, y + rowH);
    const m = markRow[i];
    if (m) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(r, g, b);
      doc.text(m, cx + cellW / 2, y + 9.5, { align: 'center' });
    }
  }
}

// Date format helper (MM/DD/YYYY for headers, matches the sample form).
function fmtMDDYYYY(d) {
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}
